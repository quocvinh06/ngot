services:
  postgres:
    image: postgres:16-alpine
    container_name: ngot-postgres
    environment:
      POSTGRES_USER: ngot
      POSTGRES_PASSWORD: ngot
      POSTGRES_DB: ngot
    ports:
      - "5432:5432"
    volumes:
      - ngot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngot -d ngot"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  ngot-pgdata:
